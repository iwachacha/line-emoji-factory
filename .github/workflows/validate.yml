name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check source integrity
        run: python tools/check-source-integrity.py

      - name: Check canonical drift
        run: python tools/check-canonical-drift.py

      - name: Check data files
        run: python tools/check-data-files.py

      - name: Compile tracked Python
        run: python -m py_compile $(git ls-files '*.py')

      - name: Compile tools and tests
        run: python -m compileall tools tests

      - name: Check schema files
        run: python tools/validate-schemas.py --check-schemas schemas

      - name: Check project map paths
        run: python tools/check-project-map-paths.py

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
              exit 1
            }
          }

      - name: Scaffold smoke test
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "smoke-brand"
          ./tools/init-brand-repo.ps1 -BrandSlug "smoke-brand" -BrandName "Smoke Brand" -Destination $dest -InitialSetCount 8 -BrandType generic
          if (Test-Path (Join-Path $dest "brand/ip")) {
            Write-Error "generic scaffold must not create brand/ip"
            exit 1
          }
          ./tools/validate-brand-repo.ps1 $dest

      - name: Validate generated metadata
        run: python tools/validate-metadata.py "$RUNNER_TEMP/smoke-brand/releases/release-001/submission/metadata.yaml"

      - name: Test suite
        run: pytest

      - name: Asset validator negative smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          root = Path("asset-negative")
          root.mkdir(exist_ok=True)
          for i in range(8):
              Image.new("RGBA", (180, 180), (0, 0, 0, 0)).save(root / f"{i + 1:03}.png", dpi=(72, 72))
          PY
          if python tools/validate-assets.py asset-negative --expected-count 8; then
            echo "fully transparent images unexpectedly passed"
            exit 1
          fi

      - name: Package smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          import os
          base = Path(os.environ["RUNNER_TEMP"]) / "smoke-brand" / "releases" / "release-001" / "production"
          finals = base / "finals"
          tab = base / "tab"
          finals.mkdir(parents=True, exist_ok=True)
          tab.mkdir(parents=True, exist_ok=True)
          for i in range(8):
              img = Image.new("RGBA", (180, 180), (0, 0, 0, 0))
              for x in range(35, 145):
                  for y in range(35, 145):
                      img.putpixel((x, y), (0, 0, 0, 255))
              img.save(finals / f"source-{i + 1}.png", dpi=(72, 72))
          tab_img = Image.new("RGBA", (96, 74), (0, 0, 0, 0))
          for x in range(15, 81):
              for y in range(15, 59):
                  tab_img.putpixel((x, y), (0, 0, 0, 255))
          tab_img.save(tab / "source-tab.png", dpi=(72, 72))
          PY
          python tools/package-release.py "$RUNNER_TEMP/smoke-brand" --release-id release-001 --target both --clean
          python tools/validate-assets.py "$RUNNER_TEMP/smoke-brand/releases/release-001/submission/line-upload/images" --expected-count 8 --stage submission --asset-type static --zip "$RUNNER_TEMP/smoke-brand/releases/release-001/submission/line-upload/images.zip"
          python - <<'PY'
          from pathlib import Path
          import os
          import zipfile
          root = Path(os.environ["RUNNER_TEMP"]) / "smoke-brand" / "releases" / "release-001" / "submission"
          with zipfile.ZipFile(root / "line-upload" / "images.zip") as archive:
              names = set(archive.namelist())
          assert "metadata.yaml" not in names
          assert "asset-map.json" not in names
          assert "package-report.md" not in names
          assert "tab.png" in names
          assert "001.png" in names
          assert "008.png" in names
          with zipfile.ZipFile(root / "internal-archive" / "package.zip") as archive:
              names = set(archive.namelist())
          assert "metadata.yaml" in names
          assert "asset-map.json" in names
          assert "package-report.md" in names
          assert "line-upload/images.zip" in names
          print("zip content check passed")
          PY
