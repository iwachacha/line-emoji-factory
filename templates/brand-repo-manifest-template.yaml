schema_version: "1.0"
factory_base_version: "[FACTORY_BASE_VERSION]"
template_schema_version: "1.1"

brand:
  slug: "your-brand-slug"
  name: "YOUR_BRAND_NAME"
  stage: "design-ready"
  owner: "owner-name"

product:
  item_type: "static-emoji"
  package_type: "emoji"
  initial_set_count: 8
  animation: false

production:
  fixed_pipeline: "gpt-image2-rough-to-claude-design"
  rough_board_dir: "production/rough-boards"
  handoff_dir: "production/handoffs"
  final_asset_dir: "production/finals"
  release_spec_dir: "emoji-sets/releases"
  prompt_bundle_dir: "prompts"

quality:
  release_checklist_path: "qa/release-checklist.md"
  quality_ledger_path: "qa/quality-ledger.md"
  usage_validation_dir: "qa/usage-validations"
  retrospective_dir: "qa/retrospectives"
  release_log_path: "submissions/release-log.md"

strategy:
  split_reason: "独立制作と継続運用が必要になったため"
  release_policy: "manual"
  sync_policy: "snapshot"
  premium_horizon: "unknown"

references:
  shared_dir: "references/shared"
  evaluation_model_snapshot_path: "references/shared/evaluation-model.md"
  line_platform_baseline_snapshot_path: "references/shared/line-platform-baseline.md"
  structure_constraints_snapshot_path: "references/shared/structure-constraints.md"
  emoji_product_rules_snapshot_path: "references/shared/emoji-product-rules.md"
  review_risk_rules_snapshot_path: "references/shared/review-risk-rules.md"
  continuous_improvement_rules_snapshot_path: "references/shared/continuous-improvement-rules.md"
  brand_startup_set_workflow_snapshot_path: "references/shared/brand-startup-set-workflow.md"
  transformation_workflow_snapshot_path: "references/shared/transformation-workflow.md"
  production_pipeline_snapshot_path: "references/shared/production-pipeline-workflow.md"
  quality_control_snapshot_path: "references/shared/quality-control-workflow.md"
  continuous_improvement_workflow_snapshot_path: "references/shared/continuous-improvement-workflow.md"
  usage_validation_workflow_snapshot_path: "references/shared/usage-validation-workflow.md"
  release_retrospective_workflow_snapshot_path: "references/shared/release-retrospective-workflow.md"

source:
  factory_repo: "line-emoji-factory"
  brand_setting_path: "brand/brand-setting.md"
  production_brief_path: "brand/brand-production-brief.md"
  system_prompt_path: "brand/brand-system-prompt.md"
  active_release_spec_path: "emoji-sets/releases/release-001.md"
