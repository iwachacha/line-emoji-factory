schema_version: '2.0'
factory_base_version: '2026-04-26'
template_schema_version: '2.0'
repo:
  profile: production
  purpose: Standalone production example migrated from legacy brand repo contract.
  owner: factory-audit
  initialized_at: '2026-04-26'
brand:
  slug: pocket-pulse
  name: Pocket Pulse
  type: generic
  stage: design-ready
  owner: factory-audit
product:
  item_type: static-emoji
  package_type: emoji
  supported_item_types:
  - static-emoji
  - static-sticker
  initial_set_count: 8
  animation: false
  status: production
market:
  observation_log: market/market-observation-log.md
  category_gap_map: market/category-gap-map.md
production:
  profile: gpt-series-production
  release_root: releases
  active_release: release-001
  final_asset_dir: releases/release-001/production/finals
  prompt_bundle_dir: releases/release-001/prompts
production_profile:
  name: gpt-series-production
  brand_canon_stage:
    purpose: brand canon and IP guardrail confirmation
    required_outputs:
    - brand_canon
    - ip_guardrails
    - allowed_variations
    - prohibited_drift
  series_planning_stage:
    purpose: release differentiation from previous products
    required_outputs:
    - product_catalog_review
    - series_plan
    - inheritance_points
    - novelty_points
    - cannibalization_notes
  rough_stage:
    purpose: style, character, motif, and set-direction exploration
    required_outputs:
    - style_anchor
    - character_anchor
    - rough_board
    - per_item_intent
    - failure_notes
  item_finalization_stage:
    purpose: one-item-at-a-time final asset candidate production
    required_outputs:
    - item_specs
    - four_candidate_minimum
    - candidate_comparison
    - final_assets
    - correction_notes
    - export_check
  product_qa_stage:
    purpose: small-size and product usability QA
    required_outputs:
    - contact_sheet
    - chat_preview
    - asset_validation_report
    - duplicate_and_usage_overlap_notes
    - unresolved_watch_items
  release_ledger_stage:
    purpose: update release ledger and brand product catalog
    required_outputs:
    - release_log_update
    - quality_ledger_update
    - product_catalog_update
    - next_series_watch
  revision_stage:
    purpose: slot-level corrections
    required_outputs:
    - revision_notes
    - fixed_assets
    - unresolved_watch_items
quality:
  release_checklist_path: releases/release-001/qa/release-checklist.md
  quality_ledger_path: releases/release-001/qa/quality-ledger.md
  usage_validation_path: releases/release-001/qa/usage-validation.md
  retrospective_path: releases/release-001/qa/release-retrospective.md
  release_log_path: releases/release-001/release-log.md
submission:
  metadata_path: releases/release-001/submission/metadata.yaml
  checklist_path: releases/release-001/submission/submission-checklist.md
  audit_report_path: releases/release-001/submission/submission-audit-report.md
  line_upload_dir: releases/release-001/submission/line-upload
  internal_archive_dir: releases/release-001/submission/internal-archive
strategy:
  split_reason: Audit brand for validating static emoji and static sticker support
    in one brand repo.
  release_policy: manual
  sync_policy: snapshot
  premium_horizon: review-after-static-sticker-release
snapshots:
  line_platform_baseline: references/shared/line-platform-baseline.md
  structure_constraints: references/shared/structure-constraints.md
  emoji_product_rules: references/shared/emoji-product-rules.md
  sticker_product_rules: references/shared/sticker-product-rules.md
  review_risk_rules: references/shared/review-risk-rules.md
  review_risk_keywords: references/shared/review-risk-keywords.yaml
  evaluation_model: references/shared/evaluation-model.md
  visual_asset_quality_rules: references/shared/visual-asset-quality-rules.md
  quality_control_workflow: references/shared/quality-control-workflow.md
  production_pipeline_workflow: references/shared/production-pipeline-workflow.md
  series_development_workflow: references/shared/series-development-workflow.md
  item_generation_workflow: references/shared/item-generation-workflow.md
  usage_validation_workflow: references/shared/usage-validation-workflow.md
  asset_validation_rules: references/shared/asset-validation-rules.md
  production_profile_rules: references/shared/production-profile-rules.md
  submission_metadata_rules: references/shared/submission-metadata-rules.md
  brand_taxonomy: references/shared/brand-taxonomy.md
  brand_creation_rules: references/shared/brand-creation-rules.md
  brand_distillation_workflow: references/shared/brand-distillation-workflow.md
  set_architecture_workflow: references/shared/set-architecture-workflow.md
source:
  factory_repo: line-emoji-factory
  brand_setting_path: brand/brand-setting.md
  brand_canon_path: brand/brand-canon.md
  product_catalog_path: brand/product-catalog.md
  brand_positioning_path: brand/brand-positioning.md
  production_brief_path: brand/brand-production-brief.md
  system_prompt_path: brand/brand-system-prompt.md
  active_release_spec_path: releases/release-001/release-spec.md
  active_series_plan_path: releases/release-001/series-plan.md
  startup_brief_path: startup/brand-startup.md
releases:
- id: release-001
  status: draft
  item_type: static-emoji
  package_type: emoji
  set_count: 8
  animation: false
  series_plan: releases/release-001/series-plan.md
  spec: releases/release-001/release-spec.md
  handoff: releases/release-001/production-handoff.md
  checklist: releases/release-001/qa/release-checklist.md
  submission: releases/release-001/submission
- id: release-002
  status: draft
  item_type: static-sticker
  package_type: sticker
  set_count: 8
  animation: false
  series_plan: releases/release-002/series-plan.md
  spec: releases/release-002/release-spec.md
  handoff: releases/release-002/production-handoff.md
  checklist: releases/release-002/qa/release-checklist.md
  submission: releases/release-002/submission
startup:
  brief: startup/brand-startup.md
  checklist: startup/startup-checklist.md
  character_data: data/characters.json
  item_seed_data: data/item-seeds.json
  asset_log: data/asset-log.csv
  prompt_library: prompts/prompt-library.md
startup_profile:
  name: brand-startup
  structure_gate_stage:
    purpose: structure gate
    required_outputs:
    - structure_judgment
    - item_type_hypothesis
    - transformation_notes
  brand_core_stage:
    purpose: brand core
    required_outputs:
    - brand_setting
    - brand_canon
    - brand_positioning
  product_seed_stage:
    purpose: product seed
    required_outputs:
    - product_hypothesis
    - first_series_seed
    - expansion_queue
  prompt_seed_stage:
    purpose: prompt seed
    required_outputs:
    - prompt_library
    - negative_prompt
    - variable_boundaries
  handoff_stage:
    purpose: handoff
    required_outputs:
    - owner_files
    - next_actions
    - unresolved_watch
